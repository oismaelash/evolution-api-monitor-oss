# Production stack: Postgres, Redis, Next.js API, BullMQ worker.
#
# Rede: apenas o serviço `api` publica porta no host (tráfego externo de entrada).
# Postgres e Redis ficam só na rede `backend` (internal: true) — sem exposição ao host
# e sem rota padrão para a internet. `api` e `worker` usam `backend` + `egress` para
# falar com DB/Redis e ainda acessar APIs externas (Evolution, billing, alertas).
#
#
# Migrations (run before first start or after schema changes):
#   docker compose -f docker-compose.prod.yml --profile migrate run --rm migrate
#
# Start:
#   docker compose -f docker-compose.prod.yml up -d
#

networks:
  backend:
    internal: true
  egress:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [backend]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-monitor_status}
    volumes:
      - monitor_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [backend]
    command: redis-server --appendonly yes
    volumes:
      - monitor_redis_prod:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    networks: [backend]
    image: ghcr.io/${GHCR_USERNAME:-oismaelash}/${GHCR_IMAGE_NAME:-evolution-api-monitor-oss}:${GHCR_IMAGE_VERSION:-latest}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-monitor_status}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    command: >
      sh -c "npm run db:migrate:deploy && npm run db:seed"

  api:
    networks: [backend, egress]
    image: ghcr.io/${GHCR_USERNAME:-oismaelash}/${GHCR_IMAGE_NAME:-evolution-api-monitor-oss}:${GHCR_IMAGE_VERSION:-latest}
    restart: unless-stopped
    ports:
      - '${API_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-monitor_status}?schema=public
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2}
      MONITOR_STATUS_API_KEY: ${MONITOR_STATUS_API_KEY:-}
      MONITOR_STATUS_BASE_URL: ${MONITOR_STATUS_BASE_URL:-}
      MONITOR_STATUS_TEMPLATE_ID: ${MONITOR_STATUS_TEMPLATE_ID:-}
      BULL_BOARD_SECRET: ${BULL_BOARD_SECRET:-}
      OPEN_SOURCE_REPO_URL: ${OPEN_SOURCE_REPO_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    networks: [backend, egress]
    image: ghcr.io/${GHCR_USERNAME:-oismaelash}/${GHCR_IMAGE_NAME:-evolution-api-monitor-oss}:${GHCR_IMAGE_VERSION:-latest}
    command: ["node", "apps/worker/dist/index.js"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-monitor_status}?schema=public
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2}
      MONITOR_STATUS_API_KEY: ${MONITOR_STATUS_API_KEY:-}
      MONITOR_STATUS_BASE_URL: ${MONITOR_STATUS_BASE_URL:-}
      MONITOR_STATUS_TEMPLATE_ID: ${MONITOR_STATUS_TEMPLATE_ID:-}
      PING_TIMEOUT_MS: ${PING_TIMEOUT_MS:-5000}
      RESTART_TIMEOUT_MS: ${RESTART_TIMEOUT_MS:-10000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  monitor_pgdata_prod:
  monitor_redis_prod:
